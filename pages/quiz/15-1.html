<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 15-1</title>
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <header class="light">
    <div class="header_inner">
      <img src="../../images/icon/logo_ci.svg" alt="전국투자교육협의회" />
      <div class="page_type">
        <p class="guide_01 on">금융투자 실험실</p>
        <p class="guide_01">심화 활동</p>
      </div>
    </div>
  </header>
  <img class="bg_layer" src="../../images/sample/bg_splash.png" alt="배경이미지">
  <main>
    <section class="main_board">
      <img src="../../images/sample/bg_paper.png" class="bg" alt="메모이미지">
      <div class="paper_wrap">
        <h2>여러분,</h2>
        <p class="body_01">눈앞에 나타난 예쁜 옷, 최신 스마트폰, 그리고 친구들과의 맛집 탐방… 이 모든 유혹을 뿌리치지 못하고 결국 지갑을 열어 용돈을 다 써버린 적이 있다면 ‘공감’버튼을 눌러 주세요!</p>
        <img src="../../images/sample/bg_like.png" alt="공감">
      </div>
      <div class="paper_inner">
        <h3 class="primary_02">많은 사람이 ‘공감’ 버튼을 눌렀어요!</h3>
        <h2>그렇다면 많은 사람이 이렇게 비슷하게<br/> 행동하는 데 어떤 이유가 있을까요?</h2>
        <button type="button" class="btn_bgDark"><i class="icon_search_light"></i>이유 확인하기</button>
      </div>
    </section>
  </main>
</body>
</html>
