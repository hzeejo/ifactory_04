<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 14-2</title>
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <header>
    <div class="header_inner">
      <img src="../../images/icon/logo_ci.svg" alt="전국투자교육협의회" />
      <div class="page_type">
        <p class="guide_01 on">금융투자 실험실</p>
        <p class="guide_01">심화 활동</p>
      </div>
    </div>
  </header>
  <main>
    <section class="main_q is_blur">
      <div class="q_box ty2"> <!-- 좌우정렬인경우 ty2 추가 -->
        <div class="q_head">
          <i class="icon_q"></i>
          <h2>다음 설명하는 것을 보기에서 골라 보세요.</h2>
        </div>
        <div class="quiz_step">
          <i class="icon_step_1 on"></i>
          <i class="icon_step_2"></i>
          <i class="icon_step_3"></i>
        </div>
      </div>
      <div class="quiz_content">
        <div class="quiz_desc">
          <h3 class="cDGray">미래의 큰 행복보다 지금 당장의 작은 즐거움을 훨씬 더 크게 느<br/>끼는 마음의 상태를 말합니다.</h3>
          <h3 class="cDGray"><span class="primary_02">우리 뇌는 신기하게도 '미래의 나’를</span> '지금의 나'와 같은 사람으로<br/> 인식하지 않고, <span class="primary_02">모르는 타인처럼 느낀다고 합니다.</span></h3>
        </div>
        <img src="../../images/sample/bg_boy_quiz1.png" alt="퀴즈 이미지">
      </div>
      <div class="quiz_check">
        <div class="check_tit">
          <label type="button" class="btn_bgPrimary2_xs">보기</label>
          <p class="body_02">무엇을 설명하고 있는지 선택하세요.</p>
        </div>
        <div class="check_list">
          <label class="checkbox_item">
            <input type="checkbox" class="checkbox_input checkbox_red" checked>
            <span class="body_01">현재 편향</span>
          </label>
          <label class="checkbox_item">
            <input type="checkbox" class="checkbox_input">
            <span class="body_01">과신 편향</span>
          </label>
          <label class="checkbox_item is_wrong">
            <input type="checkbox" class="checkbox_input" checked>
            <span class="body_01">손실회피 편향</span>
          </label>
          <label class="checkbox_item">
            <input type="checkbox" class="checkbox_input">
            <span class="body_01">화폐 착각</span>
          </label>
          <label class="checkbox_item">
            <input type="checkbox" class="checkbox_input">
            <span class="body_01">지수함수과소평가</span>
          </label>
        </div>
      </div>
      <div class="quiz_nav">
        <button type="button" class="btn_linePrimary2_sm">다음</button>
      </div>
      <!-- 정답인 경우 -->
      <div class="quiz_pop">
        <i class="icon_quiz_wrong"></i>
        <h3 class="primary_02">아쉽네요! 오답입니다.</h3>
      </div>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../../js/style.js"></script>
</body>
</html>
