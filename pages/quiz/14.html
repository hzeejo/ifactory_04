<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 14</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <img src="../../images/icon/logo_ci.svg" alt="전국투가교육협의회" />
    <div class="page_type">
      <p class="guide_01 on">금융투자 실험실</p>
      <p class="guide_01">심화 활동</p>
    </div>
  </header>
  <main>
    <section class="main_q">
      <div class="q_box ty2"> <!-- 좌우정렬인경우 ty2 추가 -->
        <div class="q_head">
          <i class="icon_q"></i>
          <h2>다음 설명하는 것을 보기에서 골라 보세요.</h2>
        </div>
        <div class="quiz_step">
          <i class="icon_step_1 on"></i>
          <i class="icon_step_2"></i>
          <i class="icon_step_3"></i>
        </div>
      </div>
      <div class="q_answer">
        <img src="../../images/sample/bg_boy_quiz1.png" alt="퀴즈 이미지">
        <div class="group_btn">
          <button type="button" class="btn_bgDark"><i class="icon_a"></i>가치가 같다</button>
          <button type="button" class="btn_bgDark"><i class="icon_b"></i>가치가 다르다</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
