<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 01</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <img src="../../images/icon/logo_ci.svg" alt="전국투가교육협의회" />
    <div class="page_type">
      <p class="guide_01 on">금융투자 실험실</p>
      <p class="guide_01">심화 활동</p>
    </div>
  </header>
  <main>
    <div class="title">
      <h1 class="align_flex">금융투자<i class="icon_lab"></i>실험실</h1>
    </div>
    <section class="main_banner">
      <h3>머니 미스터리</h3>
      <ul class="banner_lists">
        <li>
          <a href="#">
            <img src="../../images/sample/thunbs_module01.png" alt="썸네일이미지">
            <div class="banner_info">
              <p class="guide_01">1편</p>
              <p class="body_01">과거부터 현재까지 돈의 가치는 항상 일정할까?</p>
              <span class="btn_bgPrimary2_xs">#인플레이션</span>
            </div>
          </a>
        </li>
        <li>
          <a href="#">
            <img src="../../images/sample/thunbs_module02.png" alt="썸네일이미지">
            <div class="banner_info">
              <p class="guide_01">2편</p>
              <p class="body_01">매일 쓰는 천 원, 정말 별 거 아닐까?</p>
              <span class="btn_bgPrimary2_xs">#복리</span>
            </div>
          </a>
        </li>
        <li>
          <a href="#">
            <img src="../../images/sample/thunbs_module03.png" alt="썸네일이미지">
            <div class="banner_info">
              <p class="guide_01">3편</p>
              <p class="body_01">높은 수익을 제시하는 금융상품은 무엇을 확인해야 할까?</p>
              <span class="btn_bgPrimary2_xs">#위험과 수익</span>
            </div>
          </a>
        </li>
        <li>
          <a href="#">
            <img src="../../images/sample/thunbs_module04.png" alt="썸네일이미지">
            <div class="banner_info">
              <p class="guide_01">4편</p>
              <p class="body_01">분산투자와 집중투자 중 어떤 투자가 유리할까?</p>
              <span class="btn_bgPrimary2_xs">#분산투자</span>
            </div>
          </a>
        </li>
      </ul>
    </section>
  </main>
  <footer>
    <p class="guide_01 neutral_30">※ 본 콘텐츠는 Chrome 브라우저에서 가장 안정적으로 이용할 수 있습니다.(PC 및 태블릿 환경 권장)</p>
  </footer>
</body>
</html>
