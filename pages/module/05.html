<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 05</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="light">
    <img src="../../images/icon/logo_ci.svg" alt="전국투가교육협의회" /> <!-- .bg_full 클래스 사용 시 로고 light 버전 사용 -->
    <div class="page_type">
      <p class="guide_01 on">금융투자 실험실</p>
      <p class="guide_01">심화 활동</p>
    </div>
  </header>
  <img class="bg_layer" src="../../images/sample/bg_money.png" alt="배경이미지">
  <main>
    <section class="main_q">
      <div class="q_title">
        <i class="icon_q"></i>
        <h2>1년 전 용돈 3만 원과 현재 용돈 3만 원의 가치가 같을까요?</h2>
      </div>
      <div class="q_answer">
        <img src="../../images/sample/bg_boy.png" alt="가치문제 이미지">
        <div class="group_btn">
          <button type="button" class="btn_bgDark"><i class="icon_a"></i>가치가 같다</button>
          <button type="button" class="btn_bgDark"><i class="icon_b"></i>가치가 다르다</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
