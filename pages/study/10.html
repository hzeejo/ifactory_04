<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 10</title>
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <header>
    <div class="header_inner">
      <img src="../../images/icon/logo_ci.svg" alt="전국투자교육협의회" />
      <div class="page_type">
        <p class="guide_01 on">금융투자 실험실</p>
        <p class="guide_01">심화 활동</p>
      </div>
    </div>
  </header>
  <main class="bg_full ty2"> <!-- 전체 너비 사용하는 경우 .bg_full padding-top 없는 경우 ty2 추가 -->
    <img class="step_image" src="../../images/icon/icon_six.svg">
    <div class="box_red">
      <h3 class="semantic_04">가격비교</h3>
    </div>
    <section class="split_layer ty2"> <!-- 상단 멘트 영역 있는 경우 ty2 추가 -->
      <div class="tutor_notice">
        <img src="../../images/sample/ant_tutor_head.png">
        <p class="body_01 cDGray">1년 전과 똑같은 용돈, 똑같은 소비! 그런데 왜 지갑 사정은 달라졌을까요?</p>
      </div>
      <div class="split_light">
        <div class="diray_wrap">
          <div class="diary_title">
            <h2><span class="primary_02">1년 전</span> 용돈기입장</h2>
            <i class="icon_smile"></i>
          </div>
          <div class="diary_record">
            <div class="pocket">
              <p class="body_01">용돈 받음</p>
              <span class="num_03">30,000</span>
            </div>
            <ul>
              <li>
                <div class="pocket">
                  <p class="body_01">영화 예매</p>
                  <span class="num_03 primary_02">-8,000</span>
                </div>
              </li>
              <li>
                <div class="pocket">
                  <p class="body_01">영화 예매</p>
                  <span class="num_03 primary_02">-8,000</span>
                </div>
              </li>
              <li>
                <div class="pocket">
                  <p class="body_01">치킨</p>
                  <span class="num_03 primary_02">-12,000</span>
                </div>
              </li>
            </ul>
            <div class="pocket">
              <p class="body_01">남은 돈</p>
              <span class="num_01">2,000</span>
            </div>
          </div>
          <button type="button" class="btn_lineNeutral_sm">이전</button>
        </div>
      </div>
      <div class="split_gray">
        <div class="diray_wrap">
          <div class="diary_title">
            <h2><span class="primary_02">현재</span> 용돈기입장</h2>
            <i class="icon_smile"></i>
          </div>
          <div class="diary_record">
            <div class="pocket">
              <p class="body_01">용돈 받음</p>
              <span class="num_03">30,000</span>
            </div>
            <ul>
              <li>
                <div class="pocket">
                  <p class="body_01">영화 예매</p>
                  <span class="num_03 primary_02">-8,160</span>
                </div>
              </li>
              <li>
                <div class="pocket">
                  <p class="body_01">영화 예매</p>
                  <span class="num_03 primary_02">-8,160</span>
                </div>
              </li>
              <li>
                <div class="pocket">
                  <p class="body_01">치킨</p>
                  <span class="num_03 primary_02">-12,240</span>
                </div>
              </li>
            </ul>
            <div class="pocket">
              <p class="body_01">남은 돈</p>
              <span class="num_01">1,440</span>
            </div>
          </div>
          <button type="button" class="btn_linePrimary2_sm">다음</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
