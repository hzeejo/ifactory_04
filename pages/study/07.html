<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 07</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <img src="../../images/icon/logo_ci.svg" alt="전국투가교육협의회" />
    <div class="page_type">
      <p class="guide_01 on">금융투자 실험실</p>
      <p class="guide_01">심화 활동</p>
    </div>
  </header>
  <main class="bg_full"> <!-- 전체 너비 사용하는 경우 .bg_full -->
    <img class="step_image" src="../../images/icon/icon_five.svg">
    <img class="bg_layer" src="../../images/sample/bg_cinema.png" alt="배경이미지">
    <section class="bg_inner">
      <div class="search_wrap">
        <i class="icon_search_line"></i>
        <h3 class="semantic_04">비교를 위해서 동일한 상황을 가정해보겠습니다.</h3>
        <h2 class="semantic_04">아래 1년 전 기준과 현재 기준으로 영화 관람 비용을 직접 확인해 보세요.</h2>
      </div>
      <ul class="ticket_lists">
        <li>
          <div class="clip">
            <i class="icon_calendar"></i> 1년 전
          </div>
          <img src="../../images/sample/img_ticket.svg" alt="티켓이미지">
          <button type="button" class="btn_linePrimary2_sm">영화 관람 비용 → 1년 전 기준</button>
        </li>
        <li>
          <div class="clip">
            <i class="icon_calendar"></i> 현재
          </div>
          <img src="../../images/sample/img_ticket.svg" alt="티켓이미지">
          <button type="button" class="btn_linePrimary2_sm">영화 관람 비용 → 현재</button>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
