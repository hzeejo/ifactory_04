<body class="tySim"> <!-- 시뮬레이션 레이아웃 tySim, 배경색상 #D5DFF8인 경우 -->
  <header>
    <div class="header_inner">
      <img src="../../images/icon/logo_ci.svg" alt="전국투자교육협의회" />
      <div class="page_type">
        <p class="guide_01 on">금융투자 실험실</p>
        <p class="guide_01">심화 활동</p>
      </div>
    </div>
  </header>
  <main>
    <div class="sec_title bg_blue">
      <div class="st_inner">
        <h4 class="primary_03">가설</h4>
        <h2><i class="icon_money"></i>물가가 상승하는 상황에서는 1만 원의 실질가치가 시간이 지날수록 하락할 것이다.<span class="h_03">(단, 다른 조건은 동일함)</span></h2>

      </div>

  <div class="desk_wrap">

    </div>
